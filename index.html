<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自我介紹產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1814; --ink-soft: #4a4640; --ink-muted: #9a9490;
    --paper: #faf8f4; --paper-warm: #f2ede4; --paper-card: #ffffff;
    --accent: #c8521a; --accent-soft: #f0e0d4; --accent-2: #1a6b8a; --accent-3: #7a6b2a;
    --border: #e0dbd2; --radius: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; font-weight: 300; min-height: 100vh; line-height: 1.8; }

  .site-header { border-bottom: 1px solid var(--border); padding: 2rem 0 1.5rem; text-align: center; position: relative; overflow: hidden; }
  .site-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); }
  .site-header h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 600; letter-spacing: 0.1em; }
  .site-header p { margin-top: 0.5rem; font-size: 0.85rem; color: var(--ink-muted); letter-spacing: 0.05em; }

  .main-layout { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
  @media (max-width: 760px) { .main-layout { grid-template-columns: 1fr; } }

  .form-panel { background: var(--paper-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.25rem; }
  .panel-header { background: var(--paper-warm); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .panel-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 500; flex-shrink: 0; }
  .num-1 { background: var(--accent); color: white; }
  .num-2 { background: var(--accent-2); color: white; }
  .num-3 { background: var(--accent-3); color: white; }
  .panel-title { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 600; }
  .panel-subtitle { font-size: 0.75rem; color: var(--ink-muted); margin-top: 1px; }
  .panel-body { padding: 1.25rem 1.5rem; }

  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 0.4rem; letter-spacing: 0.03em; }
  .hint { font-size: 0.72rem; color: var(--ink-muted); margin-bottom: 0.4rem; display: block; }
  input[type=text], textarea { width: 100%; padding: 0.55rem 0.8rem; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem; font-weight: 300; color: var(--ink); background: var(--paper); transition: border-color 0.2s; line-height: 1.6; }
  input[type=text]:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; }
  textarea { resize: vertical; }

  .exp-block { background: var(--paper-warm); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem; border: 1px solid var(--border); }
  .exp-block-title { font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); margin-bottom: 0.75rem; letter-spacing: 0.05em; }

  .output-panel { position: sticky; top: 1.5rem; }
  .preview-card { background: var(--paper-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
  .preview-header { background: var(--ink); padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .preview-header span { font-size: 0.75rem; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; }
  .preview-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .preview-body { padding: 1.5rem; min-height: 220px; }
  .preview-section { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); animation: fadeIn 0.25s ease; }
  .preview-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  @keyframes fadeIn { from { opacity: 0.4; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
  .preview-tag { display: inline-block; font-size: 0.68rem; font-weight: 500; padding: 2px 8px; border-radius: 2px; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .tag-1 { background: var(--accent-soft); color: var(--accent); }
  .tag-2 { background: #d4eaf2; color: var(--accent-2); }
  .tag-3 { background: #ede8d4; color: var(--accent-3); }
  .preview-text { font-size: 0.9rem; line-height: 1.9; color: var(--ink); }
  .preview-placeholder { font-size: 0.85rem; color: var(--ink-muted); font-style: italic; text-align: center; padding: 2rem 0; }

  .script-card { background: var(--paper-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .script-header { padding: 0.75rem 1.25rem; background: var(--paper-warm); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .script-header-text { font-size: 0.78rem; font-weight: 500; color: var(--ink-soft); letter-spacing: 0.05em; }
  .copy-btn { background: var(--ink); color: white; border: none; padding: 0.35rem 0.9rem; border-radius: var(--radius); font-size: 0.75rem; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 0.05em; transition: background 0.2s, transform 0.1s; }
  .copy-btn:hover { background: var(--accent); }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: #2d8a4e; }
  .script-body { padding: 1.25rem; font-size: 0.85rem; line-height: 1.9; color: var(--ink-soft); min-height: 80px; white-space: pre-wrap; word-break: break-all; }

  .tips-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .tip-pill { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; background: var(--paper-warm); border: 1px solid var(--border); color: var(--ink-muted); }
</style>
</head>
<body>

<header class="site-header">
  <h1>自我介紹產生器</h1>
  <p>三段式架構 · 填入資料 · 即時預覽 · 一鍵複製</p>
</header>

<div class="main-layout">
  <div>
    <div class="form-panel">
      <div class="panel-header">
        <div class="panel-num num-1">一</div>
        <div><div class="panel-title">我是誰</div><div class="panel-subtitle">核心身份與能力關鍵字</div></div>
      </div>
      <div class="panel-body">
        <div class="field"><label>你的名字</label><input type="text" id="name" placeholder="例：Mia、志偉"></div>
        <div class="field"><label>學歷背景（可選）</label><input type="text" id="edu" placeholder="例：政大廣告所畢業"></div>
        <div class="field"><label>職稱 + 年資</label><span class="hint">用最精簡的方式點出你的身份</span><input type="text" id="role" placeholder="例：行銷企劃三年、產品經理五年"></div>
        <div class="field"><label>核心能力 2–3 個</label><span class="hint">不用展開，點到為止</span><input type="text" id="skills" placeholder="例：擅長品牌溝通策略，熟悉整合線上線下活動執行"></div>
      </div>
    </div>

    <div class="form-panel">
      <div class="panel-header">
        <div class="panel-num num-2">二</div>
        <div><div class="panel-title">我做過什麼</div><div class="panel-subtitle">近期經歷倒敘，每份說兩件事</div></div>
      </div>
      <div class="panel-body">
        <div class="exp-block">
          <div class="exp-block-title">現職 / 最近一份</div>
          <div class="field"><label>公司 + 職稱</label><input type="text" id="e1r" placeholder="例：A 品牌 行銷企劃主任"></div>
          <div class="field"><label>負責範圍</label><input type="text" id="e1s" placeholder="例：年度品牌活動與社群內容策略"></div>
          <div class="field"><label>最代表性的成果</label><input type="text" id="e1x" placeholder="例：主導全台快閃活動，單週觸及破 50 萬人次"></div>
        </div>
        <div class="exp-block">
          <div class="exp-block-title">前一份（可選）</div>
          <div class="field"><label>公司 + 職稱</label><input type="text" id="e2r" placeholder="例：B 新創 成長行銷"></div>
          <div class="field"><label>最代表性的成果</label><input type="text" id="e2x" placeholder="例：三個月讓 IG 粉絲從 5000 長到 3 萬"></div>
        </div>
      </div>
    </div>

    <div class="form-panel" style="margin-bottom:0">
      <div class="panel-header">
        <div class="panel-num num-3">三</div>
        <div><div class="panel-title">為什麼在這裡</div><div class="panel-subtitle">方向 + 為什麼這個機會符合你</div></div>
      </div>
      <div class="panel-body">
        <div class="field"><label>你在找什麼樣的環境或方向</label><span class="hint">說你想去哪，而不是逃離哪</span><input type="text" id="dir" placeholder="例：能更深入做品牌定位與長期策略的環境"></div>
        <div class="field"><label>這個機會為什麼符合你的方向</label><span class="hint">要具體，不要說「貴公司很優秀」</span><textarea id="fit" rows="3" placeholder="例：看到貴公司正在重新定義東南亞市場的品牌形象，這種需要從品牌底層思考的機會，正是我想做的事"></textarea></div>
      </div>
    </div>
  </div>

  <div class="output-panel">
    <div class="preview-card">
      <div class="preview-header"><span>即時預覽</span><div class="preview-dot"></div></div>
      <div class="preview-body" id="preview-body"><div class="preview-placeholder">填入左側資料，自我介紹即時呈現</div></div>
    </div>
    <div class="script-card">
      <div class="script-header">
        <span class="script-header-text">完整文字稿</span>
        <button class="copy-btn" id="copy-btn" onclick="copyScript()">複製</button>
      </div>
      <div class="script-body" id="script-body">—</div>
    </div>
    <div class="tips-row">
      <span class="tip-pill">說完就停，讓對方問</span>
      <span class="tip-pill">成果要具體有數字</span>
      <span class="tip-pill">第三段說方向不說逃離</span>
    </div>
    <button onclick="openClaude()" style="width:100%;margin-top:0.75rem;padding:0.7rem 1rem;background:white;color:var(--accent-2);border:1px solid var(--accent-2);border-radius:var(--radius);font-family:'Noto Sans TC',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;letter-spacing:0.04em;transition:background 0.2s;">用 Claude AI 潤飾語氣 →</button>
    <p style="font-size:0.7rem;color:var(--ink-muted);margin-top:0.4rem;text-align:center;">需要免費的 Claude 帳號・點擊後會開新分頁</p>
  </div>
</div>

<script>
['name','edu','role','skills','e1r','e1s','e1x','e2r','e2x','dir','fit']
  .forEach(id => document.getElementById(id).addEventListener('input', update));

function g(id) { return (document.getElementById(id)?.value || '').trim(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function p(s) { return s && !/[。！？]$/.test(s) ? s + '。' : s; }

function buildP1() {
  const name = g('name'), edu = g('edu'), role = g('role'), skills = g('skills');
  if (!name && !role && !skills) return '';
  let s = '面試官好，我是' + (name || '___');
  if (edu) s += '，' + edu;
  s = p(s);
  if (role && skills) s += '有' + role + '的經驗，' + p(skills);
  else if (role) s += p('有' + role + '的經驗');
  else if (skills) s += p(skills);
  return '「' + s + '」';
}

function buildP2() {
  const e1r = g('e1r'), e1s = g('e1s'), e1x = g('e1x'), e2r = g('e2r'), e2x = g('e2x');
  if (!e1r && !e1s && !e1x) return '';
  let s = '';
  if (e1r) {
    s += '目前在' + e1r;
    if (e1s && e1x) s += '，主要負責' + p(e1s) + '其中最有代表性的是' + p(e1x);
    else if (e1s) s += '，負責' + p(e1s);
    else if (e1x) s += '，做過最有代表性的是' + p(e1x);
    else s = p(s);
  }
  if (e2r) {
    s += '在這之前在' + e2r;
    s += e2x ? '，' + p(e2x) : '。';
  }
  return '「' + s + '」';
}

function buildP3() {
  const dir = g('dir'), fit = g('fit');
  if (!dir && !fit) return '';
  let s = '';
  if (dir && fit) s = '我目前在找' + dir + '的機會。' + p(fit);
  else if (dir) s = p('我目前在找' + dir);
  else s = p(fit);
  return '「' + s + '」';
}

function update() {
  const sections = [
    { tag: '第一段', cls: 'tag-1', text: buildP1() },
    { tag: '第二段', cls: 'tag-2', text: buildP2() },
    { tag: '第三段', cls: 'tag-3', text: buildP3() },
  ].filter(s => s.text);

  const preview = document.getElementById('preview-body');
  const script = document.getElementById('script-body');

  if (!sections.length) {
    preview.innerHTML = '<div class="preview-placeholder">填入左側資料，自我介紹即時呈現</div>';
    script.textContent = '—';
    return;
  }

  preview.innerHTML = sections.map(s =>
    `<div class="preview-section"><span class="preview-tag ${s.cls}">${s.tag}</span><p class="preview-text">${esc(s.text)}</p></div>`
  ).join('');
  script.textContent = sections.map(s => s.text).join('\n\n');
}

function copyScript() {
  const text = document.getElementById('script-body').textContent;
  if (!text || text === '—') return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '已複製 ✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
  });
}

function openClaude() {
  const text = document.getElementById('script-body').textContent;
  if (!text || text === '—') { alert('請先填入資料'); return; }
  const prompt = '以下是我的自我介紹草稿，請幫我潤飾成更自然、像真人在面試現場說話的口語版本。保持三段結構，語氣自然不要像在唸履歷：\n\n' + text;
  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank');
}
</script>
</body>
</html>
